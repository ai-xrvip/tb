version: "3.9"

services:
  bot:
    build: .
    container_name: ai-gf-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "7860:7860"  # Admin panel
    environment:
      - PORT=8080
      # LLM
      - LLM_PROVIDER=
      - DEEPSEEK_API_KEY=
      - DEEPSEEK_MODEL=
      # Bot Tokens (set in .env)
      - XIAOLU_BOT_TOKEN=
      # Optional
      - ADMIN_IDS=
      - ANNOUNCEMENT_CHANNEL=
      - PAYMENT_MODE=
      - WEBHOOK_URL=
      # STT (optional)
      - CF_ACCOUNT_ID=
      - CF_API_TOKEN=
      - GROQ_API_KEY=
      # TTS
      - TTS_ENABLED=
      - ADMIN_PORT=
      - ENABLE_STT=
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      - ./backups:/app/backups
      - bot_data:/app

volumes:
  bot_data:
